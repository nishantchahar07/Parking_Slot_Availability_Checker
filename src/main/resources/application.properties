# ============================================
# Intelligent Parking System - Configuration
# ============================================

# Import env file (secrets) — this file is gitignored
spring.config.import=optional:file:.env.properties

# Server
server.port=8080
spring.application.name=IntelligentParkingSystem

# MongoDB — reads from .env.properties, falls back to local
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/parkingdb}

# JWT — reads from .env.properties
jwt.secret=${JWT_SECRET:IntelligentParkingSystemSecretKey2024ForJWTTokenGenerationMustBe256BitsLong!}
jwt.expiration=86400000

# Logging
logging.level.com.ips=INFO
logging.level.org.springframework.security=WARN
logging.level.org.mongodb.driver=WARN