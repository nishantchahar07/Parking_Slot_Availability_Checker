<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPS — Intelligent Parking System</title>
    <meta name="description" content="Smart real-time parking slot availability checker with booking and management">
    <link rel="icon" type="image/png" href="icons8-parking-96.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-container">
    <div class="auth-card glass">
        <div class="auth-logo">
            <img src="icons8-parking-96.png" alt="IPS Logo">
            <h1 class="text-gradient">Intelligent Parking</h1>
            <p>Smart parking management for the modern city</p>
        </div>

        <!-- Alert -->
        <div id="alert" class="alert"></div>

        <!-- Auth Tabs -->
        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
            <button class="auth-tab" onclick="switchTab('register')">Create Account</button>
        </div>

        <!-- Login Form -->
        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-input" id="login-email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-input" id="login-password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn">Sign In</button>
        </form>

        <!-- Register Form -->
        <form id="register-form" class="hidden" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-input" id="reg-name" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-input" id="reg-email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-input" id="reg-password" placeholder="Min 6 characters" required minlength="6">
            </div>
            <div class="form-group">
                <label class="form-label">Phone Number</label>
                <input type="tel" class="form-input" id="reg-phone" placeholder="+91 9876543210">
            </div>
            <div class="form-group">
                <label class="form-label">I am a</label>
                <div class="role-selector">
                    <button type="button" class="role-option active" onclick="selectRole('DRIVER', this)">
                        <span class="role-icon">🚗</span> Driver
                    </button>
                    <button type="button" class="role-option" onclick="selectRole('MANAGER', this)">
                        <span class="role-icon">🏢</span> Manager
                    </button>
                </div>
            </div>
            <input type="hidden" id="reg-role" value="DRIVER">
            <button type="submit" class="btn btn-success btn-block btn-lg" id="reg-btn">Create Account</button>
        </form>
    </div>
</div>

<script>
const API = '/api/auth';
let selectedRole = 'DRIVER';

// Check if already logged in
(function() {
    const token = localStorage.getItem('ips_token');
    const role = localStorage.getItem('ips_role');
    if (token && role) {
        window.location.href = role === 'MANAGER' ? 'manager.html' : 'driver.html';
    }
})();

function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    if (tab === 'login') {
        document.querySelectorAll('.auth-tab')[0].classList.add('active');
        document.getElementById('login-form').classList.remove('hidden');
        document.getElementById('register-form').classList.add('hidden');
    } else {
        document.querySelectorAll('.auth-tab')[1].classList.add('active');
        document.getElementById('login-form').classList.add('hidden');
        document.getElementById('register-form').classList.remove('hidden');
    }
    hideAlert();
}

function selectRole(role, el) {
    selectedRole = role;
    document.getElementById('reg-role').value = role;
    document.querySelectorAll('.role-option').forEach(o => o.classList.remove('active'));
    el.classList.add('active');
}

function showAlert(msg, type) {
    const a = document.getElementById('alert');
    a.textContent = msg;
    a.className = 'alert show alert-' + type;
    setTimeout(() => a.classList.remove('show'), 5000);
}
function hideAlert() { document.getElementById('alert').className = 'alert'; }

async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    btn.disabled = true; btn.textContent = 'Signing in...';
    try {
        const res = await fetch(API + '/login', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({
                email: document.getElementById('login-email').value,
                password: document.getElementById('login-password').value
            })
        });
        const data = await res.json();
        if (res.ok) {
            localStorage.setItem('ips_token', data.token);
            localStorage.setItem('ips_role', data.role);
            localStorage.setItem('ips_name', data.name);
            localStorage.setItem('ips_email', data.email);
            localStorage.setItem('ips_userId', data.userId);
            showAlert('Login successful! Redirecting...', 'success');
            setTimeout(() => {
                window.location.href = data.role === 'MANAGER' ? 'manager.html' : 'driver.html';
            }, 500);
        } else {
            showAlert(data.error || 'Invalid credentials', 'error');
        }
    } catch (err) {
        showAlert('Connection error. Is the server running?', 'error');
    } finally {
        btn.disabled = false; btn.textContent = 'Sign In';
    }
}

async function handleRegister(e) {
    e.preventDefault();
    const btn = document.getElementById('reg-btn');
    btn.disabled = true; btn.textContent = 'Creating account...';
    try {
        const res = await fetch(API + '/register', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({
                name: document.getElementById('reg-name').value,
                email: document.getElementById('reg-email').value,
                password: document.getElementById('reg-password').value,
                phone: document.getElementById('reg-phone').value,
                role: selectedRole
            })
        });
        const data = await res.json();
        if (res.ok) {
            localStorage.setItem('ips_token', data.token);
            localStorage.setItem('ips_role', data.role);
            localStorage.setItem('ips_name', data.name);
            localStorage.setItem('ips_email', data.email);
            localStorage.setItem('ips_userId', data.userId);
            showAlert('Account created! Redirecting...', 'success');
            setTimeout(() => {
                window.location.href = data.role === 'MANAGER' ? 'manager.html' : 'driver.html';
            }, 500);
        } else {
            showAlert(data.error || 'Registration failed', 'error');
        }
    } catch (err) {
        showAlert('Connection error. Is the server running?', 'error');
    } finally {
        btn.disabled = false; btn.textContent = 'Create Account';
    }
}
</script>
</body>
</html>
